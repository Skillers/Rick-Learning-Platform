<!DOCTYPE html>
<html lang="nl" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Account Manager — ICT Leerlijn</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    /* ── Layout ── */
    button { cursor:pointer; }
    input,select,textarea { font-family:'Space Grotesk',sans-serif; }
    html { overflow-y:scroll; } /* prevent scrollbar shift */
    body { display:flex; flex-direction:column; min-height:100vh; }

    /* ── Topbar ── */
    .topbar {
      padding:12px 24px; border-bottom:1px solid var(--border);
      display:flex; align-items:center; gap:12px;
      background:var(--bg2); flex-shrink:0; position:sticky; top:0; z-index:10;
    }
    .topbar-brand { display:flex; align-items:center; gap:8px; }
    .brand-chip { background:var(--purple); color:#fff; font-size:10px; font-weight:700; padding:2px 7px; border-radius:4px; letter-spacing:.5px; }
    .topbar-title { font-size:15px; font-weight:600; }
    .topbar-sub { font-size:12px; color:var(--text2); }
    .topbar-right { margin-left:auto; display:flex; align-items:center; gap:8px; }

    /* ── Buttons ── */
    .btn { padding:7px 14px; border-radius:var(--radius); font-size:13px; font-weight:500; border:none; transition:all .15s; cursor:pointer; }
    .btn-primary { background:var(--accent); color:#fff; }
    .btn-primary:hover { background:var(--accent2); }
    .btn-ghost { background:var(--bg4); color:var(--text2); border:1px solid var(--border); }
    .btn-ghost:hover { color:var(--text); border-color:var(--border2); }
    .btn-danger { background:rgba(248,81,73,.1); color:var(--red); border:1px solid rgba(248,81,73,.2); }
    .btn-danger:hover { background:rgba(248,81,73,.2); }
    .btn-sm { padding:4px 10px; font-size:12px; }
    .btn-nav { width:160px; text-align:center; display:inline-block; }
    .btn-warn { background:rgba(227,179,65,.1); color:var(--yellow); border:1px solid rgba(227,179,65,.2); }
    .btn-warn:hover { background:rgba(227,179,65,.2); }

    .notif-btn {
      width:34px; height:34px; border-radius:8px; border:1px solid var(--border);
      background:var(--bg3); display:inline-flex; align-items:center; justify-content:center;
      font-size:15px; color:var(--text2); transition:all .15s; cursor:pointer;
    }
    .notif-btn:hover { background:var(--bg4); color:var(--text); border-color:var(--border2); }
    .theme-btn { font-size:15px !important; }

    /* ── Main content ── */
    .page-content { flex:1; padding:24px 28px; max-width:1200px; margin:0 auto; width:100%; }

    /* ── Stats row ── */
    .stats-row { display:flex; gap:16px; margin-bottom:24px; flex-wrap:wrap; }
    .stat-box {
      flex:1; min-width:160px; background:var(--bg2); border:1px solid var(--border);
      border-radius:var(--radius2); padding:16px 20px;
    }
    .stat-label { font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:.5px; font-weight:600; margin-bottom:4px; }
    .stat-value { font-size:24px; font-weight:700; }
    .stat-value.green { color:var(--accent2); }
    .stat-value.blue { color:var(--blue2); }
    .stat-value.orange { color:var(--orange); }
    .stat-value.red { color:var(--red); }

    /* ── Filter bar ── */
    .filter-bar { display:flex; gap:10px; margin-bottom:20px; align-items:center; flex-wrap:wrap; }
    .filter-input {
      padding:7px 12px; border-radius:var(--radius); border:1px solid var(--border);
      background:var(--bg3); color:var(--text); font-size:13px; min-width:220px;
    }
    .filter-input:focus { outline:none; border-color:var(--blue); }
    .filter-select {
      padding:7px 12px; border-radius:var(--radius); border:1px solid var(--border);
      background:var(--bg3); color:var(--text); font-size:13px;
    }
    .filter-select:focus { outline:none; border-color:var(--blue); }

    /* ── Student table ── */
    .student-table-wrap {
      background:var(--bg2); border:1px solid var(--border);
      border-radius:var(--radius2); overflow:hidden;
    }
    .student-table { width:100%; border-collapse:collapse; table-layout:fixed; }
    .student-table th {
      text-align:left; padding:10px 16px; font-size:11px; font-weight:600;
      color:var(--text3); text-transform:uppercase; letter-spacing:.5px;
      background:var(--bg3); border-bottom:1px solid var(--border);
    }
    .student-table td {
      padding:12px 16px; font-size:13px; border-bottom:1px solid var(--border);
      vertical-align:middle;
    }
    .student-table tr:last-child td { border-bottom:none; }
    .student-table tr:hover td { background:var(--bg3); }

    /* ── Role badge ── */
    .role-badge {
      font-size:10px; font-weight:600; padding:2px 8px; border-radius:4px;
      text-transform:uppercase; letter-spacing:.3px; display:inline-block;
    }
    .role-badge.superadmin { background:rgba(188,140,255,.15); color:var(--purple2); }
    .role-badge.docent { background:rgba(56,139,253,.15); color:var(--blue2); }
    .role-badge.student { background:rgba(46,160,67,.15); color:var(--accent2); }

    /* ── Status dot ── */
    .status-dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:6px; }
    .status-dot.active { background:var(--accent2); }
    .status-dot.inactive { background:var(--red); }

    /* ── Course chips ── */
    .course-chips { display:flex; gap:4px; flex-wrap:wrap; }
    .course-chip {
      font-size:10px; font-weight:600; padding:2px 8px; border-radius:4px;
      font-family:'JetBrains Mono',monospace; letter-spacing:.3px;
      display:inline-flex; align-items:center; gap:4px;
    }
    .course-chip .chip-remove {
      cursor:pointer; opacity:.5; font-size:11px; margin-left:2px;
      transition:opacity .12s;
    }
    .course-chip .chip-remove:hover { opacity:1; }
    .course-chip.c-python { background:rgba(56,139,253,.15); color:var(--blue2); }
    .course-chip.c-js     { background:rgba(227,179,65,.15); color:var(--yellow); }
    .course-chip.c-java   { background:rgba(247,129,102,.15); color:var(--orange); }
    .course-chip.c-unity  { background:rgba(188,140,255,.15); color:var(--purple2); }
    .course-chip.c-vr     { background:rgba(63,185,80,.15); color:var(--accent2); }
    .course-chip.c-math   { background:rgba(139,148,158,.15); color:var(--text2); }

    /* ── Progress bar mini ── */
    .progress-mini { display:flex; align-items:center; gap:8px; }
    .progress-mini-bar { flex:1; height:6px; background:var(--bg4); border-radius:3px; min-width:60px; overflow:hidden; }
    .progress-mini-fill { height:100%; border-radius:3px; transition:width .3s; }
    .progress-mini-label { font-size:11px; color:var(--text2); white-space:nowrap; min-width:40px; }

    /* ── Expanded row ── */
    .expand-row td { padding:0 !important; border-bottom:1px solid var(--border); }
    .expand-content {
      padding:16px 24px 20px; background:var(--bg3);
      display:none; animation:slideDown .2s ease;
    }
    .expand-content.open { display:block; }
    @keyframes slideDown { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }

    .expand-section-title { font-size:12px; font-weight:600; color:var(--text2); margin-bottom:10px; text-transform:uppercase; letter-spacing:.5px; }

    .enroll-grid { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
    .enroll-card {
      padding:8px 14px; border-radius:var(--radius); border:1px solid var(--border);
      background:var(--bg2); font-size:12px; cursor:pointer; transition:all .15s;
      display:flex; align-items:center; gap:8px;
    }
    .enroll-card:hover { border-color:var(--blue); }
    .enroll-card.enrolled { border-color:var(--accent); background:rgba(46,160,67,.06); }
    .enroll-icon {
      width:24px; height:24px; border-radius:6px; display:flex; align-items:center; justify-content:center;
      font-size:9px; font-weight:800; font-family:'JetBrains Mono',monospace;
      background:var(--bg4); color:var(--text);
    }
    .enroll-card.enrolled .enroll-check { color:var(--accent2); }

    /* ── Progress detail ── */
    .progress-detail-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr)); gap:10px; }
    .progress-card {
      padding:12px 14px; border-radius:var(--radius); border:1px solid var(--border);
      background:var(--bg2);
    }
    .progress-card-title { font-size:12px; font-weight:600; margin-bottom:8px; display:flex; align-items:center; gap:6px; }
    .progress-card-icon {
      font-size:9px; font-weight:800; font-family:'JetBrains Mono',monospace;
      padding:2px 5px; border-radius:3px; background:var(--bg4);
    }
    .progress-card-stats { font-size:11px; color:var(--text2); margin-top:6px; }

    /* ── Empty state ── */
    .empty-state { text-align:center; padding:60px 20px; color:var(--text3); }
    .empty-icon { font-size:36px; margin-bottom:12px; opacity:.4; }
    .empty-text { font-size:14px; }

    /* ── Toast ── */
    .toast {
      position:fixed; bottom:24px; right:24px; padding:12px 20px;
      background:var(--bg2); border:1px solid var(--accent); border-radius:var(--radius);
      font-size:13px; color:var(--text); box-shadow:0 8px 24px rgba(0,0,0,.4);
      transform:translateY(80px); opacity:0; transition:all .25s ease; z-index:100;
    }
    .toast.show { transform:translateY(0); opacity:1; }

    .app-content.hidden { display:none; }
  </style>
</head>
<body>

  <!-- ── App content (hidden until auth check) ── -->
  <div class="app-content hidden" id="appContent">

  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-brand">
      <div class="brand-chip">SUPER ADMIN</div>
      <div>
        <div class="topbar-title">AccountManagement</div>
        <div class="topbar-sub">Studentenbeheer, cursuskoppelingen en voortgang</div>
      </div>
    </div>
    <div class="topbar-right">
      <a href="./admin.html" class="btn btn-primary btn-sm btn-nav">Lesontwerper</a>
      <a href="./" class="btn btn-ghost btn-sm btn-nav">Studentenview</a>
      <button class="notif-btn theme-btn" id="themeToggle" onclick="toggleTheme()" title="Wissel thema">🌙</button>
      <button class="notif-btn" title="Meldingen">🔔</button>
      <div class="avatar-wrap">
        <div class="user-avatar" id="topbarAvatar" style="width:32px;height:32px;font-size:12px;cursor:pointer;"
             onclick="toggleAvatarMenu()">??</div>
        <div class="avatar-menu" id="avatarMenu">
          <div class="avatar-menu-info">
            <div class="avatar-menu-name" id="avatarMenuName">—</div>
            <div class="avatar-menu-sub" id="avatarMenuSub">admin</div>
          </div>
          <div class="avatar-menu-divider"></div>
          <button class="avatar-menu-item" onclick="window.location='./'">Naar studentenview</button>
          <div class="avatar-menu-divider"></div>
          <button class="avatar-menu-item" onclick="handleLogout()">Uitloggen</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Main content -->
  <div class="page-content">

    <!-- Stats -->
    <div class="stats-row" id="statsRow">
      <div class="stat-box"><div class="stat-label">Totaal accounts</div><div class="stat-value" id="statTotal">—</div></div>
      <div class="stat-box"><div class="stat-label">Studenten actief</div><div class="stat-value green" id="statActive">—</div></div>
      <div class="stat-box"><div class="stat-label">Docenten</div><div class="stat-value blue" id="statDocent">—</div></div>
      <div class="stat-box"><div class="stat-label">Inactief</div><div class="stat-value red" id="statInactive">—</div></div>
    </div>

    <!-- Filters -->
    <div class="filter-bar">
      <input type="text" class="filter-input" id="searchInput" placeholder="Zoek op gebruikersnaam of e-mail...">
      <select class="filter-select" id="roleFilter">
        <option value="">Alle rollen</option>
        <option value="student">Student</option>
        <option value="docent">Docent</option>
        <option value="superadmin">Super Admin</option>
      </select>
      <select class="filter-select" id="statusFilter">
        <option value="">Alle statussen</option>
        <option value="1">Actief</option>
        <option value="0">Inactief</option>
      </select>
      <select class="filter-select" id="courseFilter">
        <option value="">Alle cursussen</option>
      </select>
    </div>

    <!-- Table -->
    <div class="student-table-wrap">
      <table class="student-table">
        <thead>
          <tr>
            <th style="width:30px;"></th>
            <th style="width:12%;">Gebruiker</th>
            <th style="width:18%;">E-mail</th>
            <th style="width:9%;">Rol</th>
            <th style="width:9%;">Status</th>
            <th style="width:16%;">Cursussen</th>
            <th style="width:14%;">Voortgang</th>
            <th style="width:10%;">Lid sinds</th>
            <th style="width:60px;">Acties</th>
          </tr>
        </thead>
        <tbody id="studentTableBody">
          <tr><td colspan="9" class="empty-state"><div class="empty-icon">&#128269;</div><div class="empty-text">Laden...</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  </div><!-- /app-content -->

<script>
/* ── State ── */
let DATA = { accounts:[], enrollments:[], progress:[], totals:[] };
let allCourses = [];
let expandedUser = null;

/* ── Theme ── */
(function(){const t=localStorage.getItem("ict-theme")||"dark";applyTheme(t);})();
function toggleTheme(){const c=document.documentElement.dataset.theme||"dark";const n=c==="dark"?"light":"dark";applyTheme(n);localStorage.setItem("ict-theme",n);}
function applyTheme(t){
  document.documentElement.dataset.theme=t;
  const icon=t==="dark"?"🌙":"☀️";
  document.querySelectorAll(".theme-btn").forEach(b=>b.textContent=icon);
}

/* ── Avatar menu ── */
function toggleAvatarMenu() {
  document.getElementById("avatarMenu").classList.toggle("open");
}
function handleLogout() {
  sessionStorage.removeItem("ict_user");
  sessionStorage.removeItem("ict_email");
  window.location = "./";
}
document.addEventListener("click", (e) => {
  const wrap = document.querySelector(".avatar-wrap");
  if (wrap && !wrap.contains(e.target)) {
    document.getElementById("avatarMenu").classList.remove("open");
  }
});

/* ── Auth check — redirect to index.html if not logged in or wrong role ── */
let ADMIN_USER = null;

(async function checkAuth() {
  const username = sessionStorage.getItem("ict_user");

  // Not logged in at all — redirect to index login
  if (!username) {
    window.location.href = "./";
    return;
  }

  // Verify role via API
  try {
    const res = await fetch("api/me.php?username=" + encodeURIComponent(username));
    if (!res.ok) { window.location.href = "./"; return; }
    const data = await res.json();

    if (data.role !== "superadmin" && data.role !== "docent") {
      window.location.href = "./";
      return;
    }

    ADMIN_USER = data.username;
    document.getElementById("appContent").classList.remove("hidden");
    // Populate avatar
    const ini = data.username.substring(0,2).toUpperCase();
    document.getElementById("topbarAvatar").textContent = ini;
    document.getElementById("avatarMenuName").textContent = data.username;
    document.getElementById("avatarMenuSub").textContent = data.role;
    init();
  } catch {
    window.location.href = "./";
  }
})();

/* ── Init ── */
async function init() {
  const [accRes, courseRes] = await Promise.all([
    fetch('api/accounts.php').then(r => r.json()),
    fetch('api/courses.php').then(r => r.json())
  ]);
  DATA = accRes;
  allCourses = courseRes;
  populateCourseFilter();
  render();
}

function populateCourseFilter() {
  const sel = document.getElementById('courseFilter');
  allCourses.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = c.name;
    sel.appendChild(opt);
  });
}

/* ── Helpers ── */
function getUserEnrollments(username) {
  return DATA.enrollments.filter(e => e.username === username);
}

function getUserProgress(username) {
  return DATA.progress.filter(p => p.username === username);
}

function getCourseTotalPages(courseId) {
  const t = DATA.totals.find(t => t.course_id == courseId);
  return t ? parseInt(t.total) : 0;
}

function getOverallProgress(username) {
  const enrollments = getUserEnrollments(username);
  if (enrollments.length === 0) return { completed: 0, total: 0, pct: 0 };
  let completed = 0, total = 0;
  enrollments.forEach(e => {
    const courseTotal = getCourseTotalPages(e.course_id);
    total += courseTotal;
    const prog = DATA.progress.find(p => p.username === username && p.course_id == e.course_id);
    if (prog) completed += parseInt(prog.completed || 0);
  });
  return { completed, total, pct: total > 0 ? Math.round((completed / total) * 100) : 0 };
}

function formatDate(str) {
  if (!str) return '—';
  const d = new Date(str);
  return d.toLocaleDateString('nl-NL', { day:'2-digit', month:'short', year:'numeric' });
}

/* ── Filtering ── */
function getFiltered() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const role = document.getElementById('roleFilter').value;
  const status = document.getElementById('statusFilter').value;
  const course = document.getElementById('courseFilter').value;

  return DATA.accounts.filter(a => {
    if (search && !a.username.toLowerCase().includes(search) && !a.email.toLowerCase().includes(search)) return false;
    if (role && a.role !== role) return false;
    if (status !== '' && String(a.active) !== status) return false;
    if (course) {
      const enrolled = getUserEnrollments(a.username);
      if (!enrolled.some(e => e.course_id == course)) return false;
    }
    return true;
  });
}

/* ── Render ── */
function render() {
  const filtered = getFiltered();
  updateStats(filtered);
  renderTable(filtered);
}

function updateStats(filtered) {
  const all = DATA.accounts;
  document.getElementById('statTotal').textContent = all.length;
  document.getElementById('statActive').textContent = all.filter(a => a.active == 1 && a.role === 'student').length;
  document.getElementById('statDocent').textContent = all.filter(a => a.role === 'docent' || a.role === 'superadmin').length;
  document.getElementById('statInactive').textContent = all.filter(a => a.active == 0).length;
}

function renderTable(filtered) {
  const tbody = document.getElementById('studentTableBody');
  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="9" class="empty-state"><div class="empty-icon">&#128269;</div><div class="empty-text">Geen accounts gevonden</div></td></tr>';
    return;
  }

  let html = '';
  filtered.forEach(a => {
    const enrollments = getUserEnrollments(a.username);
    const prog = getOverallProgress(a.username);
    const isExpanded = expandedUser === a.username;

    html += `<tr class="student-row" data-username="${a.username}">
      <td style="text-align:center;cursor:pointer;" onclick="toggleExpand('${a.username}')">
        <span style="font-size:11px;color:var(--text3);transition:transform .2s;display:inline-block;${isExpanded?'transform:rotate(90deg)':''}">&#9654;</span>
      </td>
      <td><strong>${a.username}</strong></td>
      <td style="color:var(--text2);font-size:12px;">${a.email}</td>
      <td><span class="role-badge ${a.role}">${a.role}</span></td>
      <td><span class="status-dot ${a.active==1?'active':'inactive'}"></span>${a.active==1?'Actief':'Inactief'}</td>
      <td><div class="course-chips">${enrollments.map(e =>
        `<span class="course-chip ${e.course_color}">${e.course_icon}</span>`
      ).join('')}${enrollments.length === 0 ? '<span style="font-size:11px;color:var(--text3);">—</span>' : ''}</div></td>
      <td>${a.role === 'student' ? `<div class="progress-mini">
        <div class="progress-mini-bar"><div class="progress-mini-fill" style="width:${prog.pct}%;background:${prog.pct>=80?'var(--accent2)':prog.pct>=40?'var(--blue)':'var(--orange)'};"></div></div>
        <span class="progress-mini-label">${prog.pct}%</span>
      </div>` : '<span style="font-size:11px;color:var(--text3);">—</span>'}</td>
      <td style="font-size:12px;color:var(--text2);">${formatDate(a.created_at)}</td>
      <td>
        ${a.active == 1
          ? `<button class="btn btn-danger btn-sm" onclick="toggleActive('${a.username}',0)" title="Deactiveer">&#10005;</button>`
          : `<button class="btn btn-primary btn-sm" onclick="toggleActive('${a.username}',1)" title="Activeer">&#10003;</button>`
        }
      </td>
    </tr>`;

    // Expanded detail row
    html += `<tr class="expand-row"><td colspan="9">
      <div class="expand-content ${isExpanded?'open':''}" id="expand-${a.username}">
        <div class="expand-section-title">Cursuskoppelingen</div>
        <div class="enroll-grid">${allCourses.map(c => {
          const isEnrolled = enrollments.some(e => e.course_id == c.id);
          return `<div class="enroll-card ${isEnrolled?'enrolled':''}" onclick="toggleEnroll('${a.username}',${c.id},${isEnrolled?'true':'false'})">
            <div class="enroll-icon">${c.icon}</div>
            <span>${c.name}</span>
            <span class="enroll-check">${isEnrolled?'&#10003;':''}</span>
          </div>`;
        }).join('')}</div>

        ${a.role === 'student' ? `<div class="expand-section-title">Voortgang per cursus</div>
        <div class="progress-detail-grid">${enrollments.map(e => {
          const courseTotal = getCourseTotalPages(e.course_id);
          const prog = DATA.progress.find(p => p.username === a.username && p.course_id == e.course_id);
          const completed = prog ? parseInt(prog.completed || 0) : 0;
          const pct = courseTotal > 0 ? Math.round((completed / courseTotal) * 100) : 0;
          return `<div class="progress-card">
            <div class="progress-card-title"><span class="progress-card-icon">${e.course_icon}</span>${e.course_name}</div>
            <div class="progress-mini">
              <div class="progress-mini-bar"><div class="progress-mini-fill" style="width:${pct}%;background:${pct>=80?'var(--accent2)':pct>=40?'var(--blue)':'var(--orange)'};"></div></div>
              <span class="progress-mini-label">${completed}/${courseTotal}</span>
            </div>
            <div class="progress-card-stats">Ingeschreven: ${formatDate(e.enrolled_at)}</div>
          </div>`;
        }).join('')}</div>` : ''}
      </div>
    </td></tr>`;
  });

  tbody.innerHTML = html;
}

/* ── Actions ── */
function toggleExpand(username) {
  expandedUser = expandedUser === username ? null : username;
  render();
}

async function toggleActive(username, active) {
  await fetch('api/account_toggle.php', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, active })
  });
  const acc = DATA.accounts.find(a => a.username === username);
  if (acc) acc.active = active;
  render();
  showToast(`${username} is nu ${active ? 'actief' : 'inactief'}`);
}

async function toggleEnroll(username, courseId, isEnrolled) {
  const method = isEnrolled ? 'DELETE' : 'POST';
  await fetch('api/account_courses.php', {
    method,
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, course_id: courseId })
  });
  // Refresh data
  const res = await fetch('api/accounts.php').then(r => r.json());
  DATA = res;
  render();
  const course = allCourses.find(c => c.id == courseId);
  showToast(isEnrolled
    ? `${username} uitgeschreven uit ${course?.name}`
    : `${username} ingeschreven voor ${course?.name}`
  );
}

/* ── Toast ── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

/* ── Filter listeners ── */
document.getElementById('searchInput').addEventListener('input', render);
document.getElementById('roleFilter').addEventListener('change', render);
document.getElementById('statusFilter').addEventListener('change', render);
document.getElementById('courseFilter').addEventListener('change', render);

/* ── Boot ── */
init();
</script>
