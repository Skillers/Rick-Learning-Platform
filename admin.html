/* ══════════════════ POINTER-EVENT DRAG SYSTEM ══════════════════ */
let dragState = null;          // null | {type, id, fromSectionId?, card}
let dragPending = null;        // null | {card, startX, startY}
let dragPlaceholder = null;
let autoScrollTimer = null;
let autoScrollDir = 0;
const DRAG_THRESHOLD = 5;      // pixels of movement before drag activates

function wireEditorEvents() {
  // Drag handles start a pending drag on pointerdown
  document.querySelectorAll('.section-drag-handle').forEach(handle => {
    handle.addEventListener('pointerdown', onHandlePointerDown);
  });

  // Keep scroll-zone visibility in sync with scroll position during drag
  const main = document.getElementById('editorMain');
  if (main && !main.dataset.scrollWired) {
    main.dataset.scrollWired = '1';
    main.addEventListener('scroll', () => {
      if (document.body.classList.contains('is-dragging')) updateScrollZonesVisibility();
    });
  }
}

function onHandlePointerDown(e) {
  // Only left button
  if (e.button !== 0) return;
  const card = e.currentTarget.closest('.section-card, .component-card');
  if (!card) return;

  e.preventDefault();
  dragPending = { card, startX: e.clientX, startY: e.clientY };

  document.addEventListener('pointermove', onDocPointerMove);
  document.addEventListener('pointerup',   onDocPointerUp);
  document.addEventListener('keydown',     onDocKeyDown);
}

function onDocPointerMove(e) {
  // Start drag when movement exceeds threshold
  if (dragPending && !dragState) {
    const dx = e.clientX - dragPending.startX;
    const dy = e.clientY - dragPending.startY;
    if (Math.hypot(dx, dy) >= DRAG_THRESHOLD) {
      activateDrag();
    } else {
      return;
    }
  }
  if (!dragState) return;

  // Position the placeholder based on mouse location
  positionPlaceholder(e.clientX, e.clientY);
  // Drive auto-scroll from mouse Y
  handleAutoScroll(e.clientX, e.clientY);
}

function activateDrag() {
  const card = dragPending.card;
  if (card.classList.contains('section-card')) {
    dragState = { type: 'section', id: card.dataset.sectionId, card };
  } else {
    const parentSection = card.closest('.section-card');
    dragState = {
      type: 'component',
      id: card.dataset.compId,
      fromSectionId: parentSection?.dataset.sectionId,
      card,
    };
  }

  dragPlaceholder = document.createElement('div');
  dragPlaceholder.className = 'drag-placeholder ' +
    (dragState.type === 'section' ? 'ph-section' : 'ph-component');

  card.classList.add('dragging');
  document.body.classList.add('is-dragging');
  createScrollZones();
}

function positionPlaceholder(clientX, clientY) {
  // Temporarily hide our own card so elementFromPoint doesn't hit it
  const card = dragState.card;
  const prevPE = card.style.pointerEvents;
  card.style.pointerEvents = 'none';
  const elUnder = document.elementFromPoint(clientX, clientY);
  card.style.pointerEvents = prevPE;

  if (!elUnder) return;

  if (dragState.type === 'section') {
    const area = elUnder.closest('#sectionsArea');
    if (!area) return;
    positionSectionPlaceholder(area, clientY);
  } else {
    const list = elUnder.closest('.components-list');
    if (!list) return;
    positionComponentPlaceholder(list, clientY);
  }
}

function positionSectionPlaceholder(area, clientY) {
  const draggingCard = dragState.card;
  const siblings = [...area.querySelectorAll(':scope > .section-card:not(.dragging)')];
  const next = siblings.find(s => {
    const box = s.getBoundingClientRect();
    return clientY < box.top + box.height / 2;
  });

  if (dragPlaceholder.parentNode) dragPlaceholder.remove();

  if (next) area.insertBefore(dragPlaceholder, next);
  else {
    const addBtn = area.querySelector(':scope > .add-section-btn');
    if (addBtn) area.insertBefore(dragPlaceholder, addBtn);
    else area.appendChild(dragPlaceholder);
  }

  // Hide if adjacent to dragged card (no-op drop)
  const prev = dragPlaceholder.previousElementSibling;
  const nxt  = dragPlaceholder.nextElementSibling;
  if (prev === draggingCard || nxt === draggingCard) dragPlaceholder.remove();
}

function positionComponentPlaceholder(list, clientY) {
  const draggingCard = dragState.card;
  const isSameList = draggingCard.parentElement === list;

  const siblings = [...list.querySelectorAll(':scope > .component-card:not(.dragging)')];
  const next = siblings.find(s => {
    const box = s.getBoundingClientRect();
    return clientY < box.top + box.height / 2;
  });

  if (dragPlaceholder.parentNode) dragPlaceholder.remove();

  if (next) list.insertBefore(dragPlaceholder, next);
  else list.appendChild(dragPlaceholder);

  if (isSameList) {
    const prev = dragPlaceholder.previousElementSibling;
    const nxt  = dragPlaceholder.nextElementSibling;
    if (prev === draggingCard || nxt === draggingCard) dragPlaceholder.remove();
  }
}

function handleAutoScroll(clientX, clientY) {
  const main = document.getElementById('editorMain');
  if (!main) return;
  const rect = main.getBoundingClientRect();
  const zoneH = 80;
  const inX = clientX >= rect.left && clientX <= rect.right;
  const topY    = Math.max(0, rect.top);
  const bottomY = Math.min(window.innerHeight, rect.bottom);
  const st = getScrollState();

  if (inX && !st.atTop && clientY >= topY && clientY < topY + zoneH) {
    startAutoScroll(-1);
  } else if (inX && !st.atBottom && clientY <= bottomY && clientY > bottomY - zoneH) {
    startAutoScroll(+1);
  } else {
    stopAutoScroll();
  }
}

function onDocPointerUp(e) {
  // If only pending (never crossed threshold), just cancel
  if (dragPending && !dragState) {
    cleanupDrag();
    return;
  }
  if (!dragState) { cleanupDrag(); return; }

  // Commit the drop based on placeholder position
  if (dragPlaceholder && dragPlaceholder.parentNode) {
    commitDrop();
  }
  finishDrag();
}

function onDocKeyDown(e) {
  if (e.key === 'Escape' && dragState) {
    finishDrag(true);
  }
}

function commitDrop() {
  if (dragState.type === 'section') {
    const area = dragPlaceholder.parentNode;
    if (!area || !area.id === 'sectionsArea' && !area.classList.contains('sections-area')) {
      // fallback: find target by placeholder's next sibling
    }
    const children = [...area.children];
    const phIdx = children.indexOf(dragPlaceholder);
    let targetId = null;
    for (let i = phIdx + 1; i < children.length; i++) {
      const c = children[i];
      if (c.classList.contains('section-card') && !c.classList.contains('dragging')) {
        targetId = c.dataset.sectionId; break;
      }
    }
    const srcIdx = activePage.sections.findIndex(s => s.id === dragState.id);
    if (srcIdx === -1) return;
    const [moved] = activePage.sections.splice(srcIdx, 1);
    if (targetId) {
      const ti = activePage.sections.findIndex(s => s.id === targetId);
      activePage.sections.splice(ti, 0, moved);
    } else {
      activePage.sections.push(moved);
    }
    markUnsaved(); debounceSave();
  } else {
    const list = dragPlaceholder.parentNode;
    if (!list || !list.classList.contains('components-list')) return;
    const toSectionId = list.dataset.sectionId;
    const children = [...list.children];
    const phIdx = children.indexOf(dragPlaceholder);
    let targetCompId = null;
    for (let i = phIdx + 1; i < children.length; i++) {
      const c = children[i];
      if (c.classList.contains('component-card') && !c.classList.contains('dragging')) {
        targetCompId = c.dataset.compId; break;
      }
    }
    const fromSection = activePage.sections.find(s => s.id === dragState.fromSectionId);
    const toSection   = activePage.sections.find(s => s.id === toSectionId);
    if (!fromSection || !toSection) return;
    const srcIdx = fromSection.components.findIndex(c => c.id === dragState.id);
    if (srcIdx === -1) return;
    const [moved] = fromSection.components.splice(srcIdx, 1);
    if (targetCompId) {
      const ti = toSection.components.findIndex(c => c.id === targetCompId);
      toSection.components.splice(ti, 0, moved);
    } else {
      toSection.components.push(moved);
    }
    markUnsaved(); debounceSave();
  }
}

function finishDrag(canceled) {
  if (dragState?.card) dragState.card.classList.remove('dragging');
  if (dragPlaceholder?.parentNode) dragPlaceholder.remove();
  dragPlaceholder = null;
  dragState = null;

  document.body.classList.remove('is-dragging');
  removeScrollZones();
  stopAutoScroll();
  cleanupDrag();

  if (!canceled) renderEditor();
}

function cleanupDrag() {
  dragPending = null;
  document.removeEventListener('pointermove', onDocPointerMove);
  document.removeEventListener('pointerup',   onDocPointerUp);
  document.removeEventListener('keydown',     onDocKeyDown);
}

function getScrollContainer() {
  let el = document.getElementById('editorMain');
  while (el && el !== document.body) {
    const cs = getComputedStyle(el);
    const oy = cs.overflowY;
    const scrollable = (oy === 'auto' || oy === 'scroll' || oy === 'overlay');
    if (scrollable && el.scrollHeight > el.clientHeight + 1) return el;
    el = el.parentElement;
  }
  return document.scrollingElement || document.documentElement;
}

function getScrollState() {
  const c = getScrollContainer();
  const isWindow = (c === document.scrollingElement || c === document.documentElement || c === document.body);
  const scrollTop    = isWindow ? window.scrollY : c.scrollTop;
  const clientHeight = isWindow ? window.innerHeight : c.clientHeight;
  const scrollHeight = isWindow ? document.documentElement.scrollHeight : c.scrollHeight;
  return {
    container: c, isWindow, scrollTop, clientHeight, scrollHeight,
    atTop:    scrollTop <= 0,
    atBottom: scrollTop + clientHeight >= scrollHeight - 1,
  };
}

function createScrollZones() {
  removeScrollZones();
  const main = document.getElementById('editorMain');
  const rect = main ? main.getBoundingClientRect() : null;
  const left     = rect ? Math.max(0, rect.left) : 0;
  const width    = rect ? Math.min(window.innerWidth - left, rect.width) : window.innerWidth;
  const topY     = rect ? Math.max(0, rect.top) : 0;
  const bottomY  = rect ? Math.min(window.innerHeight, rect.bottom) : window.innerHeight;

  const zoneH = 80;

  const top = document.createElement('div');
  top.id = 'scrollZoneTop';
  top.className = 'scroll-zone top';
  Object.assign(top.style, {
    left:  left + 'px',
    top:   topY + 'px',
    width: width + 'px',
    height: zoneH + 'px',
  });
  top.innerHTML = '<span class="arrow">▲</span>';
  document.body.appendChild(top);

  const bot = document.createElement('div');
  bot.id = 'scrollZoneBottom';
  bot.className = 'scroll-zone bottom';
  Object.assign(bot.style, {
    left:  left + 'px',
    top:   (bottomY - zoneH) + 'px',
    width: width + 'px',
    height: zoneH + 'px',
  });
  bot.innerHTML = '<span class="arrow">▼</span>';
  document.body.appendChild(bot);

  updateScrollZonesVisibility();
}

function removeScrollZones() {
  document.getElementById('scrollZoneTop')?.remove();
  document.getElementById('scrollZoneBottom')?.remove();
}

function updateScrollZonesVisibility() {
  const zt = document.getElementById('scrollZoneTop');
  const zb = document.getElementById('scrollZoneBottom');
  const st = getScrollState();
  if (zt) zt.style.display = st.atTop    ? 'none' : 'flex';
  if (zb) zb.style.display = st.atBottom ? 'none' : 'flex';
}

function startAutoScroll(dir) {
  if (autoScrollDir === dir) return;
  autoScrollDir = dir;
  if (autoScrollTimer) { clearInterval(autoScrollTimer); autoScrollTimer = null; }
  if (dir === 0) return;
  autoScrollTimer = setInterval(() => {
    const st = getScrollState();
    if (st.isWindow) {
      window.scrollBy(0, dir * 14);
    } else {
      st.container.scrollTop += dir * 14;
    }
    updateScrollZonesVisibility();
    const st2 = getScrollState();
    if (dir < 0 && st2.atTop)    stopAutoScroll();
    if (dir > 0 && st2.atBottom) stopAutoScroll();
  }, 16);
}

function stopAutoScroll() {
  autoScrollDir = 0;
  if (autoScrollTimer) { clearInterval(autoScrollTimer); autoScrollTimer = null; }
}


/* ═══ MUTATIONS ═══ */
function markUnsaved() { unsaved = true; }
function markSaved() { unsaved = false; }

function updateMeta(field, value) {
  if (!activePage) return;
  activePage[field] = value;

  if (field === "title") {

    const badge = document.querySelector(`.tree-page-item[data-page-id="${activePage.id}"] .tree-page-type`);

// ── Version control: concept / live / archived ──────────────────────────────
// Renders the version cycler + actions inside the page-settings card. A page
// has at most one live and one concept; archived versions are read-only.
function renderVersionBar() {
  const vs  = activePage.versions || [];
  const cur = activePage.viewVersionId;
  const conceptV = vs.find(v => v.status === 'concept');
  const viewed   = vs.find(v => v.id == cur) || null;
  const isLive   = !!viewed && viewed.status === 'live';
  const STATUS_NL = { concept: 'Concept', live: 'Live', archived: 'Archief' };

  const enabled = !!activePage.enabled;

  const chips = vs.map(v => {
    const main = `<button class="ver-chip ver-${v.status} ${v.id == cur ? 'active' : ''}"
            onclick="viewVersion(${v.id})" title="${esc(v.title || '')}">
      <span class="ver-dot"></span>${STATUS_NL[v.status] || v.status} v${v.version_no}
    </button>`;
    const del = v.status === 'archived'
      ? `<button class="ver-del" title="Verwijder deze gearchiveerde versie" onclick="deleteVersion(${v.id})">✕</button>`
      : '';
    return `<span class="ver-chip-wrap">${main}${del}</span>`;
  }).join('');

  const hint =
    activePage.editMode === 'concept' ? 'Concept — vrij te bewerken; publiceer om live te zetten.'
    : activePage.editMode === 'live'  ? 'Live — pas hier direct tekst aan. Onderdelen toevoegen of verwijderen? Maak een concept.'
    : isLive                          ? 'Live — er bestaat al een concept. Bewerk dat en publiceer.'
    :                                   'Gearchiveerde versie — alleen-lezen. Maak live om terug te zetten.';

  return `
    <div class="version-bar">
      <div class="field-label" style="margin-bottom:6px;">Versies</div>
      <div class="ver-chips">${chips || '<span style="color:var(--text3);font-size:12px;">Geen versies</span>'}</div>
      <div class="ver-actions">
        ${viewed && !isLive ? `<button class="btn btn-sm btn-pub" onclick="makeVersionLive(${cur})">Maak deze versie live</button>` : ''}
        ${conceptV
          ? (activePage.editable ? '' : `<button class="btn btn-sm" onclick="viewVersion(${conceptV.id})">Naar concept</button>`)
          : `<button class="btn btn-sm" onclick="createConcept()">Nieuw concept</button>`}
      </div>
      <div class="page-status-hint" style="margin-top:8px;">${hint}</div>
      <div class="ver-visibility">
        <span class="ver-dot ${enabled ? 'vis-on' : 'vis-off'}"></span>
        <span>${enabled ? 'Zichtbaar voor studenten' : 'Verborgen voor studenten'}</span>
        <button class="btn btn-sm" onclick="togglePageEnabled()">${enabled ? 'Verbergen' : 'Zichtbaar maken'}</button>
      </div>
    </div>`;
}

// Delete an archived version (its private content is GC'd server-side).
async function deleteVersion(versionId) {
  if (!confirm('Deze gearchiveerde versie definitief verwijderen?')) return;
  try {
    const res = await fetch('api/delete_version.php', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ version_id: versionId }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok || !data.ok) { alert(data.error || 'Verwijderen mislukt.'); return; }
    const wasViewing = activePage.viewVersionId === versionId;
    await openPageFromDb(activePage.dbId, false, wasViewing ? null : activePage.viewVersionId);
  } catch (err) { alert('Verwijderen mislukt: ' + err.message); }
}

// Toggle whether the whole page is visible to students.
async function togglePageEnabled() {
  if (!activePage || !activePage.dbId) return;
  const next = activePage.enabled ? 0 : 1;
  try {
    const res = await fetch('api/set_page_enabled.php', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ page_id: activePage.dbId, enabled: next }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok || !data.ok) { alert(data.error || 'Wijzigen mislukt.'); return; }
    activePage.enabled = data.enabled;
    const p = PAGES.find(pg => pg.id == activePage.dbId);
    if (p) p.enabled = data.enabled;
    renderEditor();
  } catch (err) { alert('Wijzigen mislukt: ' + err.message); }
}

// View (load) a specific version of the current page.
async function viewVersion(versionId) {
  if (!activePage) return;
  await openPageFromDb(activePage.dbId, false, versionId);
}

// Start the single editable concept (cloned from live), then open it.
async function createConcept() {
  if (!activePage || !activePage.dbId) return;
  try {
    const res = await fetch('api/create_concept.php', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ page_id: activePage.dbId }),
    });
    const data = await res.json().catch(() => ({}));

// Promote a version to live (archives the current live one).
async function makeVersionLive(versionId) {
  if (!versionId) return;
  if (!confirm('Deze versie live zetten? De huidige live versie wordt gearchiveerd.')) return;
  try {
    const res = await fetch('api/set_live_version.php', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ version_id: versionId }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok || !data.ok) { alert(data.error || 'Live zetten mislukt.'); return; }
    const p = PAGES.find(pg => pg.id == data.page_id);
    if (p) { p.published = 1; p.live_version_id = versionId; }
    await openPageFromDb(activePage.dbId, false, versionId);
  } catch (err) { alert('Live zetten mislukt: ' + err.message); }
}

function updateMetaSubject(subjectId) {
  if (!activePage) return;
  // Pick first course in that subject, default to current if still valid
  const currentCourse = COURSES.find(c => c.id == activePage.courseId);
  if (currentCourse && currentCourse.subject_id == subjectId) return;
  const firstCourse = COURSES.find(c => c.subject_id == subjectId);
  if (!firstCourse) return;
  updateMeta("courseId", firstCourse.id);
  // Rebuild course select with filtered options
  const courseSel = document.getElementById("metaCourse");
  if (courseSel) {
    courseSel.innerHTML = COURSES
      .filter(c => c.subject_id == subjectId)
      .map(c => `<option value="${c.id}" ${c.id==firstCourse.id?'selected':''}>${esc(c.name)}</option>`)
      .join("");
  }
}

function updateSectionTitle(input) {
  const section = activePage?.sections.find(s => s.id === input.dataset.sectionId);
  if (section) { section.title = input.value; markUnsaved(); debounceSave(); buildCourseSidebar(); }
}

function updateComp(textarea) {
  const comp = findComp(textarea.dataset.compId);
  if (!comp) return;
  const prev = comp.content;
  comp.content = textarea.value;
  markUnsaved(); debounceSave();

  // For multimedia: if URL cleared → re-render so upload button reappears
  // if URL freshly added → re-render so upload button disappears
  if (comp.type === "multimedia" || comp.type === "video" || comp.type === "image") {
    const hadUrl = !!(prev && prev.trim());
    const hasUrl = !!(comp.content && comp.content.trim());
    if (hadUrl !== hasUrl) renderEditor();
  }
}

function updateCompMeta(input) {
  const comp = findComp(input.dataset.compId);
  if (!comp) return;
  const field = input.dataset.field.replace("meta.","");
  if (!comp.meta) comp.meta = {};
  comp.meta[field] = input.value;
  markUnsaved(); debounceSave();

  // Re-render divider preview live
  if (comp.type === "divider") {
    const card = input.closest(".component-card");
    const preview = card.querySelector(".spacer-block");
    if (preview) {
      const lt = comp.meta.lineType || "line";
      const before = comp.meta.before ?? 16;
      const after = comp.meta.after ?? 16;
      preview.style.paddingTop = before + "px";
      preview.style.paddingBottom = after + "px";
      preview.innerHTML = lt === "nothing" ? "" : `<hr class="spacer-line spacer-${lt}" />`;
    }
  }
}

/* ── Quiz editor (open vs. multiple choice) ── */
function quizDataOf(comp) {
  if (!comp.meta) comp.meta = {};
  if (!comp.meta.quizData || typeof comp.meta.quizData !== 'object') {
    comp.meta.quizData = { question: comp.content || '', open_question: 1, answers: [] };
  }
  if (!Array.isArray(comp.meta.quizData.answers)) comp.meta.quizData.answers = [];
  return comp.meta.quizData;
}

function setQuizType(compId, isOpen) {
  const comp = findComp(compId); if (!comp) return;
  const qd = quizDataOf(comp);
  qd.open_question = isOpen ? 1 : 0;
  // Seed two empty options the first time someone switches to multiple choice.
  if (!isOpen && qd.answers.length === 0) {
    qd.answers = [{ text: '', is_correct: 0 }, { text: '', is_correct: 0 }];
  }
  markUnsaved(); debounceSave(); renderEditor();
}

function updateQuizQuestion(compId, value) {
  const comp = findComp(compId); if (!comp) return;
  const qd = quizDataOf(comp);
  qd.question = value;
  comp.content = value;            // mirror for the save fallback + previews
  markUnsaved(); debounceSave();   // no re-render → keep textarea focus
}

function addQuizAnswer(compId) {
  const comp = findComp(compId); if (!comp) return;
  quizDataOf(comp).answers.push({ text: '', is_correct: 0 });
  markUnsaved(); debounceSave(); renderEditor();
}

function removeQuizAnswer(compId, idx) {
  const comp = findComp(compId); if (!comp) return;
  quizDataOf(comp).answers.splice(idx, 1);
  markUnsaved(); debounceSave(); renderEditor();
}

function updateQuizAnswerText(compId, idx, value) {
  const comp = findComp(compId); if (!comp) return;
  const a = quizDataOf(comp).answers[idx];
  if (a) { a.text = value; markUnsaved(); debounceSave(); }  // no re-render → keep focus
}

function setQuizAnswerCorrect(compId, idx, checked) {
  const comp = findComp(compId); if (!comp) return;
  const qd = quizDataOf(comp);
  const a = qd.answers[idx];
  if (!a) return;
  a.is_correct = checked ? 1 : 0;
  // Live-toggle the "select at least one correct" warning without a re-render.
  const warn = document.querySelector(`[data-quiz-warn="${compId}"]`);
  if (warn) warn.style.display = qd.answers.some(x => x.is_correct) ? 'none' : '';
  markUnsaved(); debounceSave();
}

async function uploadMediaFile(input, compId) {
  const comp = findComp(compId);
  if (!comp || !input.files?.[0]) return;
  const file = input.files[0];
  const fd = new FormData();
  fd.append("file", file);
  try {
    const res = await fetch("api/upload_media.php", { method: "POST", body: fd });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: "Upload failed" }));
      alert("Upload mislukt: " + (err.error || res.status));
      return;
    }
    const data = await res.json();
    comp.meta = comp.meta || {};
    comp.meta.uploaded = data.path;
    comp.meta.title = data.original_name || file.name;
    comp.content = ""; // clear URL mode
    markUnsaved(); debounceSave();
    renderEditor();
  } catch (e) {
    alert("Upload mislukt: " + e.message);
  }
}

function removeUploadedMedia(compId) {
  const comp = findComp(compId);
  if (!comp) return;
  comp.meta = comp.meta || {};
  delete comp.meta.uploaded;
  delete comp.meta.title;
  markUnsaved(); debounceSave();
  renderEditor();
}

function setCalloutStyle(btn, style) {
  const comp = findComp(btn.dataset.compId);
  if (!comp) return;
  comp.meta = comp.meta || {};
  comp.meta.style = style;
  // Update active state on buttons
  btn.closest(".callout-style-row").querySelectorAll(".callout-style-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  markUnsaved(); debounceSave();
}

function findComp(compId) {
  for (const s of activePage?.sections || []) {
    const c = s.components.find(c => c.id === compId);
    if (c) return c;
  }
  return null;
}

// False (and warns) when the active view is a live in-place edit — no adding,
// removing or reordering of sections/components is allowed there.
function structuralAllowed() {
  if (!activePage) return false;
  if (activePage.editMode !== 'concept') {
    if (activePage.editMode === 'live')
      alert('Op een live versie kun je alleen tekst aanpassen. Maak een concept om onderdelen of secties toe te voegen, te verwijderen of te herordenen.');
    return false;
  }
  return true;
}

function addSection() {
  if (!activePage) return;
  if (!structuralAllowed()) return;
  activePage.sections.push(makeSection("Nieuwe sectie", []));
  markUnsaved(); debounceSave(); renderEditor(); buildCourseSidebar();
  // Focus the new section title
  const inputs = document.querySelectorAll(".section-title-input");
  inputs[inputs.length-1]?.focus();
  inputs[inputs.length-1]?.select();
}

function deleteSection(sectionId) {
  if (!activePage) return;
  if (!structuralAllowed()) return;
  if (!confirm("Sectie verwijderen? Dit kan niet ongedaan worden gemaakt.")) return;
  activePage.sections = activePage.sections.filter(s => s.id !== sectionId);
  markUnsaved(); debounceSave(); renderEditor(); buildCourseSidebar();
}

function moveSection(sectionId, dir) {
  if (!activePage) return;
  if (!structuralAllowed()) return;
  const idx = activePage.sections.findIndex(s => s.id === sectionId);
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= activePage.sections.length) return;
  [activePage.sections[idx], activePage.sections[newIdx]] = [activePage.sections[newIdx], activePage.sections[idx]];
  markUnsaved(); debounceSave(); renderEditor(); buildCourseSidebar();
}

function addComponent(sectionId, type) {
  if (!structuralAllowed()) return;
  const section = activePage?.sections.find(s => s.id === sectionId);
  if (!section) return;
  const defaults = {
    text:    { content:"", meta:{} },
    code:    { content:"", meta:{ language:"python", filename:"" } },
    callout: { content:"", meta:{ style:"tip", title:"💡 Tip" } },
    video:   { content:"", meta:{ caption:"" } },
    quiz:    { content:"", meta:{ label:"🎯 Opdracht", quizData:{ question:"", open_question:1, answers:[] } } },
  }[type] || { content:"", meta:{} };
  section.components.push(makeComp(type, defaults.content, defaults.meta));
  markUnsaved(); debounceSave(); renderEditor();
}

function deleteComp(sectionId, compId) {
  if (!structuralAllowed()) return;
  const section = activePage?.sections.find(s => s.id === sectionId);
  if (!section) return;
  section.components = section.components.filter(c => c.id !== compId);
  markUnsaved(); debounceSave(); renderEditor();
}

function moveComp(sectionId, compId, dir) {
  if (!structuralAllowed()) return;
  const section = activePage?.sections.find(s => s.id === sectionId);
  if (!section) return;
  const idx = section.components.findIndex(c => c.id === compId);
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= section.components.length) return;
  [section.components[idx], section.components[newIdx]] = [section.components[newIdx], section.components[idx]];
  markUnsaved(); debounceSave(); renderEditor();
}

async function deletePage() {
  if (!activePage || !activePage.dbId) return;
  const courseId = activePage.courseId;
  const msg = activePage.published
    ? `"${activePage.title}" is ACTIEF (zichtbaar voor studenten). Definitief verwijderen, inclusief voortgang van studenten?`
    : `"${activePage.title}" definitief verwijderen?`;
  if (!confirm(msg)) return;

  setSaveStatus('saving');
  try {
    const res = await fetch('api/delete_page.php', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ page_id: activePage.dbId }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok || !data.ok) throw new Error(data.error || ('HTTP ' + res.status));
  } catch (err) {
    setSaveStatus('error');
    alert('Verwijderen mislukt: ' + err.message);
    return;
  }

  activePage = null; activePageId = null;
  setSaveStatus(null);
  await refreshPagesSections();
  // Back to the course's main view.
  if (courseId != null && COURSES.some(c => c.id == courseId)) selectCourse(courseId);
  else showCourseOverview();
}

/* ── Debounced auto-save (localStorage cache + DB persistence) ── */
let saveTimer;
function debounceSave() {
  clearTimeout(saveTimer);
  setSaveStatus('saving');
  saveTimer = setTimeout(() => { saveTimer = null; savePages(); persistActivePage(); }, 800);
}

// Persist a pending (debounced) autosave right now. Called before navigating
// away so edits to the page you're leaving aren't lost to the 800ms race.
async function flushPendingSave() {
  if (!saveTimer) return;
  clearTimeout(saveTimer); saveTimer = null;
  await persistActivePage();
}

// Small topbar status pill.
function setSaveStatus(state) {
  const el = document.getElementById('saveIndicator');
  if (!el) return;
  const map = {
    saving:   { cls: 'unsaved', text: '⏳ Bezig met opslaan…' },
    saved:    { cls: 'saved',   text: '✓ Opgeslagen' },
    error:    { cls: 'unsaved', text: '⚠ Opslaan mislukt' },
    readonly: { cls: 'unsaved', text: '🔒 Gepubliceerd — niet auto-opgeslagen' },
  };
  const s = map[state];
  if (!s) { el.style.display = 'none'; return; }
  el.className = 'save-indicator ' + s.cls;
  el.textContent = s.text;
  el.style.display = '';
}

// Convert the in-memory activePage into the save_page.php payload shape.
function buildPagePayload() {
  if (!activePage) return null;
  return {
    db_id:      activePage.dbId || null,
    version_id: activePage.viewVersionId || null,
    course_id: parseInt(activePage.courseId, 10),
    title:     activePage.title || 'Naamloze pagina',
    type:      activePage.type || 'lesson',
    xp:        parseInt(activePage.xp, 10) || 0,
    sections:  (activePage.sections || []).map(s => ({
      db_id:      s.dbId || null,
      title:      s.title || 'Sectie',
      components: (s.components || []).map(c => ({
        type:    c.type,
        content: c.content || '',
        meta:    c.meta || {},
      })),
    })),
  };
}

// Persist the active page to the database. New pages get a db_id back; drafts
// are replace-all saved and we refresh the section ids from the response.
let _persisting = false;
async function persistActivePage() {
  if (!activePage) return;
  // Only the concept is editable; viewing live/archived is read-only.
  if (!activePage.editable) { setSaveStatus('readonly'); return; }
  const payload = buildPagePayload();
  if (!payload) return;
  // Safety: never let an autosave persist an empty tree (e.g. a transient load
  // failure) — that would wipe the version. A real page always has a section.
  if (!payload.sections.length) { setSaveStatus('saved'); return; }
  if (_persisting) return;            // a save is already in flight; the next edit re-triggers
  _persisting = true;
  // Concept → full replace-with-fork; live → in-place content-only update.
  const url = activePage.editMode === 'live' ? 'api/update_live.php' : 'api/save_page.php';
  try {
    const res  = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json().catch(() => ({}));
    if (res.status === 409 && data.structural) {
      setSaveStatus('error');
      alert('Op een live versie kun je alleen tekst aanpassen. Maak een concept om onderdelen toe te voegen, te verwijderen of te herordenen.');
      return;
    }
    if (res.status === 409) { setSaveStatus('readonly'); return; }
    if (!res.ok || !data.ok) { setSaveStatus('error'); console.warn('[persist]', data); return; }

    if (data.db_id) activePage.dbId = data.db_id;
    // Keep local section ids in sync with whatever the server returned.
    (data.sections || []).forEach((id, i) => { if (activePage.sections[i]) activePage.sections[i].dbId = id; });
    markSaved();
    setSaveStatus('saved');
  } catch (err) {
    console.warn('[persist]', err);
    setSaveStatus('error');
  } finally {
    _persisting = false;
  }
}

// A preset swatch just loads its hex into the free color input.
function ncPickColor(hex) {

// Live preview chip + custom swatch + hex label + selected preset ring.
function ncSyncPreview() {
  const hex = document.getElementById("ncColor").value;
  document.getElementById("ncColorPreview").style.background =
    `linear-gradient(135deg, ${hex}, ${_courseDarken(hex, 0.7)})`;
  const sw = document.getElementById("ncCustomSwatch"); if (sw) sw.style.background = hex;
  const hx = document.getElementById("ncHex");          if (hx) hx.textContent = hex.toUpperCase();
  document.querySelectorAll('#ncColorPresets .color-swatch').forEach(el =>
    el.classList.toggle('selected', (el.dataset.color || '').toLowerCase() === hex.toLowerCase()));
}

// Auto-suggest a 2-letter icon from the course name until the user types one.
function ncSyncIconPlaceholder() {
  const name = document.getElementById("ncName").value.trim();
  const icon = (document.getElementById("ncIcon").value.trim() || name.slice(0, 2) || "AB").toUpperCase();
  document.getElementById("ncIcon").placeholder = icon;
  document.getElementById("ncColorPreview").textContent = icon;
}

function closeNewCourseModal() {
  const modal = document.getElementById("newCourseModal");
  modal.classList.remove("visible");
  setTimeout(() => modal.style.display = "none", 200);
}

async function createNewCourse() {
  const subjectId = parseInt(document.getElementById("ncSubject").value, 10);
  const name      = document.getElementById("ncName").value.trim();
  const iconEl    = document.getElementById("ncIcon");
  const icon      = (iconEl.value.trim() || name.slice(0, 2)).toUpperCase();
  const color     = document.getElementById("ncColor").value || '#388bfd';
  if (!name) { document.getElementById("ncName").focus(); return; }

  setSaveStatus('saving');
  let data;
  try {
    const res = await fetch('api/save_course.php', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ subject_id: subjectId, name, icon, color }),
    });
    data = await res.json();
    if (!res.ok || !data.ok) throw new Error(data.error || ('HTTP ' + res.status));
  } catch (err) {
    setSaveStatus('error');
    alert('Cursus aanmaken mislukt: ' + err.message);
    return;
  }

  // Add to the in-memory list (or re-fetch for canonical data).
  COURSES.push(data.course);
  setSaveStatus('saved');
  closeNewCourseModal();
  // Drop the teacher straight into the new (empty) course so they can add pages.
  selectCourse(data.course.id);
}

// Re-fetch the DB page/section lists so a freshly created page is openable.
async function refreshPagesSections() {
  try {
    const [pageRes, secRes] = await Promise.all([fetch('api/pages.php?include_unpublished=1'), fetch('api/sections.php')]);
    if (pageRes.ok) PAGES = await pageRes.json();
    if (secRes.ok) SECTIONS = await secRes.json();
    if (TEACHER_SCOPE) {
      const allowed = TEACHER_SCOPE.courses;
      PAGES = PAGES.filter(p => allowed.includes(p.course_id));
    }
  } catch (_) {}
}

async function createNewPage() {
  const courseId = document.getElementById("npCourse").value;
  const title    = document.getElementById("npTitle").value.trim();
  const type     = document.getElementById("npType").value;
  const xp       = parseInt(document.getElementById("npXP").value) || 60;
  if (!title) { document.getElementById("npTitle").focus(); return; }

  setSaveStatus('saving');
  const payload = {
    db_id: null, course_id: parseInt(courseId, 10), title, type, xp,
    sections: [{ title: "Introductie", components: [{ type: "text", content: "", meta: {} }] }],
  };

  let data;
  try {
    const res = await fetch('api/save_page.php', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload),
    });
    data = await res.json();
    if (!res.ok || !data.ok) throw new Error(data.error || ('HTTP ' + res.status));
  } catch (err) {
    setSaveStatus('error');
    alert('Pagina aanmaken mislukt: ' + err.message);
    return;
  }

  setSaveStatus('saved');
  closeNewPageModal();
  await refreshPagesSections();
  buildCourseSidebar();
  openPageFromDb(data.db_id);
}

/* ═══ HELPERS ═══ */
function esc(str) { return (str||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function escHTML(str) { return (str||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function escAttr(str) { return (str||"").replace(/"/g,"&quot;"); }

/* Course color: hex (#rrggbb) or legacy class (c-python, …) → inline styles. */
const _LEGACY_COURSE_COLORS = {
  'c-python':'#388bfd','c-js':'#e3b341','c-java':'#f78166','c-unity':'#bc8cff','c-vr':'#3fb950','c-math':'#8b949e'
};
function courseHex(c) {
  if (!c) return '#8b949e';
  if (c[0] === '#') return c;
  return _LEGACY_COURSE_COLORS[c] || '#8b949e';
}
function _courseRGB(c) {
  let h = courseHex(c).replace('#',''); if (h.length === 3) h = h.split('').map(x=>x+x).join('');
  const n = parseInt(h, 16); return [(n>>16)&255,(n>>8)&255,n&255];
}
function courseTint(c, a) { const [r,g,b]=_courseRGB(c); return `rgba(${r},${g},${b},${a})`; }
function _courseDarken(c, f) { const [r,g,b]=_courseRGB(c); return `rgb(${Math.round(r*f)},${Math.round(g*f)},${Math.round(b*f)})`; }
function courseIconStyle(c) { return `background:linear-gradient(135deg, ${courseHex(c)}, ${_courseDarken(c,0.7)});color:#fff;border-color:${courseTint(c,0.4)};`; }
// `color` feeds the card's ::before hover gradient (currentColor) — keep it a
// faint tint, not the inherited near-white text color.
function courseTintStyle(c) { return `background:${courseTint(c,0.08)};border-color:${courseTint(c,0.2)};color:${courseTint(c,0.22)};`; }
/* ═══ USER / AUTH (shared with dashboard via sessionStorage) ═══ */
let TEACHER_SCOPE = null; // null = superadmin (no restrictions), { courses:[], students:[] } = docent

async function loadUser() {
  const name = sessionStorage.getItem("ict_user");
  if (!name) { window.location = "./"; return null; }

  try {
    const res = await fetch("api/me.php?username=" + encodeURIComponent(name));
    if (!res.ok) { window.location = "./"; return null; }
    const data = await res.json();
    if (data.role !== "superadmin" && data.role !== "docent") {
      window.location = "./"; return null;
    }
    if (data.role === "docent") {
      TEACHER_SCOPE = { courses: data.courses || [], students: data.students || [] };
    }
    return { name: data.username, initials: data.username.slice(0,2).toUpperCase(), role: data.role };
  } catch {
    window.location = "./"; return null;
  }
}

/* ═══ INIT ═══ */
(async () => {
  const user = await loadUser();
  if (!user) return;

  // Populate avatar
  document.getElementById("topbarAvatar").textContent = user.initials;
  document.getElementById("avatarMenuName").textContent = user.name;
  document.getElementById("avatarMenuSub").textContent = user.role;

  try {
    const [subjRes, courseRes, pageRes, secRes] = await Promise.all([
      fetch('api/subjects.php'),
      fetch('api/courses.php'),
      fetch('api/pages.php?include_unpublished=1'),
      fetch('api/sections.php'),
    ]);
    if (subjRes.ok) SUBJECTS = await subjRes.json();
    if (courseRes.ok) COURSES = await courseRes.json();
    if (pageRes.ok) PAGES = await pageRes.json();
    if (secRes.ok) SECTIONS = await secRes.json();
  } catch (_) {}

  // Scope: docent only sees assigned courses + their pages
  if (TEACHER_SCOPE) {
    const allowed = TEACHER_SCOPE.courses;
    COURSES = COURSES.filter(c => allowed.includes(c.id));
    PAGES = PAGES.filter(p => allowed.includes(p.course_id));
  }

  loadPages();
  buildFloatingPanelButtons();
  showCourseOverview();
})();
